name: QuotaWarmer
options:
  bundleIdPrefix: com.quotawarmer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  QuotaWarmer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/QuotaWarmer
    info:
      path: Sources/QuotaWarmer/Info.plist
      properties:
        CFBundleDisplayName: QuotaWarmer
        CFBundleName: QuotaWarmer
        CFBundleIdentifier: com.quotawarmer.app
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSUserNotificationUsageDescription: "QuotaWarmer sends alerts when your 5h quota window is about to reset."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quotawarmer.app
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
