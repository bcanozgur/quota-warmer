name: Release (unsigned)

# Builds an ad-hoc signed (not Apple-notarized) DMG and publishes a GitHub
# Release. Requires no Apple Developer secrets — only the built-in GITHUB_TOKEN.
# The app is ad-hoc signed so it runs after download, but it is NOT notarized,
# so users must clear Gatekeeper quarantine on first launch (see release notes
# and the Homebrew cask caveats).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string, for example 1.0.0"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  APP_NAME: QuotaWarmer
  SCHEME: QuotaWarmer
  BUNDLE_ID: com.quotawarmer.app
  MINIMUM_MACOS: "14.0"

jobs:
  release:
    name: Ad-hoc signed DMG
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            VERSION="${RELEASE_TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            RELEASE_TAG="v${VERSION}"
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}"
            echo "Expected vMAJOR.MINOR.PATCH, optionally with a prerelease suffix."
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Validate project version
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_VERSION=$(awk -F'"' '/CFBundleShortVersionString:/ { print $2; exit }' project.yml)
          if [[ "${PROJECT_VERSION}" != "${{ steps.version.outputs.version }}" ]]; then
            echo "project.yml CFBundleShortVersionString (${PROJECT_VERSION}) does not match tag version (${{ steps.version.outputs.version }})."
            exit 1
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release app (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate and ad-hoc sign app
        id: app
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH=$(find DerivedData -name "${APP_NAME}.app" -maxdepth 8 | head -1)
          if [[ -z "${APP_PATH}" || ! -d "${APP_PATH}" ]]; then
            echo "Could not locate built app."
            exit 1
          fi
          # Ad-hoc signature ("-") so the app launches on Apple Silicon after download.
          codesign --force --deep --sign - "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          echo "app_path=${APP_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="${APP_NAME}-${VERSION}-universal.dmg"
          STAGING="staging_dmg"
          rm -rf "${STAGING}" "${DMG_NAME}"
          mkdir -p "${STAGING}"
          cp -R "${{ steps.app.outputs.app_path }}" "${STAGING}/"
          ln -s /Applications "${STAGING}/Applications"
          hdiutil create \
            -volname "${APP_NAME} ${VERSION}" \
            -srcfolder "${STAGING}" \
            -ov \
            -format UDZO \
            "${DMG_NAME}"
          echo "name=${DMG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Checksum and manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.name }}"
          SHA256=$(shasum -a 256 "${DMG}" | awk '{print $1}')
          shasum -a 256 "${DMG}" > "${DMG}.sha256"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.version.outputs.tag }}/${DMG}"
          cat > latest.json <<JSON
          {
            "version": "${{ steps.version.outputs.version }}",
            "pub_date": "${PUB_DATE}",
            "minimum_system_version": "${MINIMUM_MACOS}",
            "assets": {
              "dmg": {
                "url": "${DOWNLOAD_URL}",
                "sha256": "${SHA256}"
              }
            }
          }
          JSON
          echo "sha256=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > RELEASE_NOTES.md <<EOF
          ## QuotaWarmer ${{ steps.version.outputs.version }}

          macOS menu bar app for starting Claude Code and Codex quota windows with minimal warmup messages.

          > This build is **ad-hoc signed but not Apple-notarized**. macOS Gatekeeper
          > will warn on first launch. Clear quarantine once after installing:
          >
          > \`\`\`
          > xattr -dr com.apple.quarantine /Applications/QuotaWarmer.app
          > \`\`\`
          >
          > or right-click the app and choose **Open** the first time.

          ### Install via Homebrew

          \`\`\`
          brew install --cask bcanozgur/tap/quotawarmer
          \`\`\`

          ### Install manually

          1. Download \`${{ steps.dmg.outputs.name }}\` below.
          2. Open the DMG and drag **QuotaWarmer.app** to Applications.
          3. Clear quarantine (command above) or right-click → Open.

          ### Verification

          SHA-256:

          \`\`\`
          $(cat "${{ steps.dmg.outputs.name }}.sha256")
          \`\`\`
          EOF

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: QuotaWarmer ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.dmg.outputs.name }}
            ${{ steps.dmg.outputs.name }}.sha256
            latest.json
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

      # Pushes the new version + sha256 into the Homebrew cask so
      # `brew install --cask bcanozgur/tap/quotawarmer` stays current.
      # Requires a fine-grained PAT secret TAP_GITHUB_TOKEN with
      # "Contents: Read and write" on bcanozgur/homebrew-tap. Skipped if unset.
      - name: Bump Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.manifest.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_TOKEN:-}" ]]; then
            echo "TAP_GITHUB_TOKEN not set — skipping cask bump."
            echo "Add the secret to enable automatic Homebrew updates."
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/bcanozgur/homebrew-tap.git" tap
          CASK="tap/Casks/quotawarmer.rb"
          perl -pi -e "s/^  version \".*\"/  version \"${VERSION}\"/" "${CASK}"
          perl -pi -e "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "${CASK}"
          cd tap
          if git diff --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/quotawarmer.rb
          git commit -m "Update QuotaWarmer cask to ${VERSION}"
          git push origin HEAD:main
